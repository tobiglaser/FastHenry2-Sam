name: "Build&Release"
on:
  push:
    tags:
      - "*"
jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Build
        run: |
          make fasthenry
          make clean
      
      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/fasthenry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}