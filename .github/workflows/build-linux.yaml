name: "Build Linux"
on:
  push:
    tags:
      - "*"
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Build
        run: |
          make fasthenry
          zip fasthenry-Linux.zip -vj bin/fasthenry
      
      - name: Release to GitHub
        uses: softprops/action-gh-release@v3
        with:
          files: |
            fasthenry-Linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}